[terminal.shell]
program = "/usr/bin/env"
args = ["bash", "-lc", "exec \"$HOME/.local/bin/tmux-launch.sh\""]

[font]
size = 12.0

[font.normal]
family = "HackNerdFontMono"
style = "Regular"

[font.bold]
family = "HackNerdFontMono"
style = "Bold"

[font.italic]
family = "HackNerdFontMono"
style = "Italic"

[font.bold_italic]
family = "HackNerdFontMono"
style = "Bold Italic"

